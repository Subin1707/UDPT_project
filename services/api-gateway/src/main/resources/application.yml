server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/products/**,/api/categories/**,/api/inventory/**
        - id: cart-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/cart/**
        - id: order-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/orders/**
        - id: payment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/payments/**
        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/notifications/**,/ws/**
        - id: delivery-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/deliveries/**
        - id: analytics-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/analytics/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
